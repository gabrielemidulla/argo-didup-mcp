# mysql, mcp, telegram: avvia solo ciò che ti serve (Docker Desktop o CLI).
# Esempi: `docker compose up mysql -d` | `docker compose up mcp telegram -d` | `docker compose up -d`
#
# Build contesto: root del monorepo per mcp e telegram.

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-argo_root_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-argo_bot}
      MYSQL_USER: ${MYSQL_USER:-argo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-argo_change_me}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: packages/argo-mcp/Dockerfile
    env_file:
      - .env
    environment:
      MCP_HOST: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/mcp',{method:'OPTIONS'}).then(r=>process.exit(r.status===204?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    depends_on:
      - mysql
    restart: unless-stopped

  telegram:
    build:
      context: .
      dockerfile: packages/telegram-bot/Dockerfile
    env_file:
      - .env
    environment:
      MCP_URL: http://mcp:3000/mcp
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-argo_bot}
      MYSQL_USER: ${MYSQL_USER:-argo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-argo_change_me}
      # Memoria persistente fuori dall'immagine: rebuild/ricreazione container non cancella MEMORY.md
      TELEGRAM_MEMORY_PATH: /data/MEMORY.md
    volumes:
      - telegram_user_memory:/data
    depends_on:
      - mysql
      - mcp
    restart: unless-stopped

volumes:
  mysql_data:
  telegram_user_memory:
